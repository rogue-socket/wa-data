<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WA Message Monitor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

    :root {
      --bg: #f4efe4;
      --panel: #fffaf1;
      --ink: #212121;
      --muted: #686868;
      --line: #ded4be;
      --accent: #0f766e;
      --accent-2: #164e63;
      --new: #d8f3dc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 10%, #fff6da 0%, transparent 48%),
        radial-gradient(circle at 80% 90%, #dbeafe 0%, transparent 45%),
        var(--bg);
      color: var(--ink);
      font-family: 'Space Grotesk', sans-serif;
      padding: 20px;
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
    }

    .hero {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(120deg, #ecfeff 0%, #fef3c7 100%);
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 14px;
    }

    .controls {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .controls input,
    .controls select,
    .controls button {
      border: 1px solid var(--line);
      background: #fffdf7;
      color: var(--ink);
      border-radius: 10px;
      padding: 8px 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.82rem;
    }

    .controls button {
      cursor: pointer;
      font-weight: 500;
      background: #e0f2fe;
    }

    .title {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      display: inline-block;
      margin-right: 8px;
      animation: pulse 1.6s infinite;
      vertical-align: middle;
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(1.35); }
      100% { opacity: 1; transform: scale(1); }
    }

    .table-wrap {
      width: 100%;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 820px;
    }

    thead th {
      text-align: left;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #f9f2e3;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      font-size: 0.95rem;
    }

    tbody tr.row-new {
      background: var(--new);
      transition: background 1.2s ease;
    }

    .mono {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.86rem;
      color: #3b3b3b;
      word-break: break-all;
    }

    .empty {
      padding: 36px 20px;
      color: var(--muted);
      text-align: center;
      font-size: 0.98rem;
    }

    .msg {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .error {
      color: #991b1b;
      font-weight: 500;
    }

    @media (max-width: 780px) {
      body {
        padding: 10px;
      }

      .hero {
        padding: 14px;
      }

      .title {
        font-size: 1.1rem;
      }

      .meta {
        font-size: 0.86rem;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="hero">
      <h1 class="title">WhatsApp Message Monitor</h1>
      <p class="meta">
        <span><span class="status-dot"></span>Live polling every 2 seconds</span>
        <span id="count">Messages: 0</span>
        <span id="updated">Updated: -</span>
      </p>
      <div class="controls">
        <input id="groupIdFilter" placeholder="Filter by group_id" />
        <input id="groupNameFilter" placeholder="Filter by group name" />
        <select id="sortByFilter">
          <option value="newest">Sort: newest</option>
          <option value="oldest">Sort: oldest</option>
          <option value="rank">Sort: rank</option>
          <option value="duplicates">Sort: duplicates</option>
        </select>
        <button id="applyFilters">Apply</button>
        <button id="clearFilters">Clear</button>
      </div>
    </header>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Time</th>
            <th>Sender</th>
            <th>Group</th>
            <th>Message</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="empty" class="empty">No messages yet. Send a WhatsApp group message to see it here.</div>
    </section>
  </main>

  <script>
    const rowsEl = document.getElementById('rows');
    const emptyEl = document.getElementById('empty');
    const countEl = document.getElementById('count');
    const updatedEl = document.getElementById('updated');
    const groupIdFilterEl = document.getElementById('groupIdFilter');
    const groupNameFilterEl = document.getElementById('groupNameFilter');
    const sortByFilterEl = document.getElementById('sortByFilter');
    const applyFiltersEl = document.getElementById('applyFilters');
    const clearFiltersEl = document.getElementById('clearFilters');

    let previousTopId = null;
    let activeFilters = {
      group_id: '',
      group_name: '',
      sort_by: 'newest',
    };

    function toReadableTime(unixSeconds) {
      const value = Number(unixSeconds);
      if (!Number.isFinite(value) || value <= 0) {
        return '-';
      }

      return new Date(value * 1000).toLocaleString();
    }

    function cell(text, className = '') {
      const td = document.createElement('td');
      if (className) {
        td.className = className;
      }
      td.textContent = text ?? '';
      return td;
    }

    function render(messages) {
      rowsEl.innerHTML = '';

      if (!Array.isArray(messages) || messages.length === 0) {
        emptyEl.style.display = 'block';
        countEl.textContent = 'Messages: 0';
        return;
      }

      emptyEl.style.display = 'none';
      countEl.textContent = `Messages: ${messages.length}`;

      const currentTopId = messages[0] ? messages[0].id : null;

      for (const message of messages) {
        const tr = document.createElement('tr');
        if (previousTopId !== null && message.id > previousTopId) {
          tr.classList.add('row-new');
        }

        tr.appendChild(cell(String(message.id || ''), 'mono'));
        tr.appendChild(cell(toReadableTime(message.timestamp)));
        tr.appendChild(cell(String(message.sender || ''), 'mono'));
        const groupLabel = message.group_name || message.group_id || '';
        tr.appendChild(cell(String(groupLabel), 'mono'));
        tr.appendChild(cell(String(message.text || ''), 'msg'));
        rowsEl.appendChild(tr);
      }

      previousTopId = currentTopId;
    }

    function buildQueryParams() {
      const params = new URLSearchParams();
      if (activeFilters.group_id) {
        params.set('group_id', activeFilters.group_id);
      }
      if (activeFilters.group_name) {
        params.set('group_name', activeFilters.group_name);
      }
      if (activeFilters.sort_by) {
        params.set('sort_by', activeFilters.sort_by);
      }
      return params.toString();
    }

    async function loadMessages() {
      try {
        const query = buildQueryParams();
        const endpoint = query ? `/messages?${query}` : '/messages';
        const response = await fetch(endpoint, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        render(data);
        updatedEl.textContent = `Updated: ${new Date().toLocaleTimeString()}`;
      } catch (error) {
        emptyEl.style.display = 'block';
        emptyEl.classList.add('error');
        emptyEl.textContent = `Unable to load messages: ${error.message}`;
      }
    }

    applyFiltersEl.addEventListener('click', () => {
      activeFilters = {
        group_id: groupIdFilterEl.value.trim(),
        group_name: groupNameFilterEl.value.trim(),
        sort_by: sortByFilterEl.value,
      };
      loadMessages();
    });

    clearFiltersEl.addEventListener('click', () => {
      groupIdFilterEl.value = '';
      groupNameFilterEl.value = '';
      sortByFilterEl.value = 'newest';
      activeFilters = {
        group_id: '',
        group_name: '',
        sort_by: 'newest',
      };
      loadMessages();
    });

    loadMessages();
    setInterval(loadMessages, 2000);
  </script>
</body>
</html>
